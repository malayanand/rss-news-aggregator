version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: newsapp-db
    environment:
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: postgres 
      POSTGRES_DB: newsapp_db
    ports:
      - "5431:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  migrate:
    image: migrate/migrate:latest
    container_name: newsapp-migrate
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./migrations:/migrations
    entrypoint: ["migrate"]
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://postgres:postgres@postgres:5432/newsapp_db?sslmode=disable",
        "up"
      ]
  
  nlp:
    build:
      context: ./nlp
      dockerfile: Dockerfile
    container_name: newsapp-nlp
    ports:
      - "8000:8000"

  api:
    build: .
    container_name: newsapp-api
    depends_on: 
      - migrate
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/newsapp_db?sslmode=disable"
      CLASSIFIER_URL: "http://nlp:8000"

volumes:
  db_data:
    driver: local
